# PostgreSQL. Versions 9.3 and up are supported.
# Credentials should be set in a .env file locally or as ENV vars on the server.
# Reference: https://guides.rubyonrails.org/configuring.html#configuring-a-database
#
default: &default
  adapter: postgresql
  encoding: unicode
  # Thread pool size (usually matches Puma threads)
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

  # Connection details with local defaults
  host: <%= ENV.fetch("DB_HOST") { 'localhost' } %>

  username: <%= ENV.fetch("DB_USERNAME") { 'postgres' } %>
  password: <%= ENV.fetch("DB_PASSWORD") { '' } %>

development:
  <<: *default
  database: e_log_pulse_development

test:
  <<: *default
  database: e_log_pulse_test

# Do not store sensitive credentials in this file. 
# Use server environment variables or a credentials manager.
production:
  <<: *default
  # Production DB name defaults to the app name suffix
  database: <%= ENV.fetch("DB_NAME") { 'e_log_pulse_production' } %>