# Note: In development, manual broadcasts only work from the web-console, 
# not 'bin/rails console', because the 'async' adapter is process-specific.
development:
  adapter: async

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
